function cleanOCRText(t){
 return String(t||'')
  .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
  .replace(/\r/g,'\n')
  .replace(/[|]/g,'I')
  .replace(/[“”]/g,'"')
  .replace(/[_]{2,}/g,' ')
  .replace(/[^\S\r\n]+/g,' ')
  .replace(/([A-Z]{2,})(:)/g,'$1:')
  .trim();
}
function normalizeLine(x){return String(x||'').replace(/\s{2,}/g,' ').trim()}
function onlyDigits(x){return String(x||'').replace(/\D/g,'')}
function lineAfter(lines,label){
 let rx=new RegExp('^\\s*'+label+'\\s*[:\\-\\.]*\\s*(.*)$','i');
 for(let i=0;i<lines.length;i++){
   let m=lines[i].match(rx);
   if(m){
     let same=normalizeLine(m[1]||'');
     if(same)return same;
     for(let j=i+1;j<Math.min(lines.length,i+3);j++){
       if(lines[j] && !/^(cpf|cnpj|ie|inscricao|tel|telefone|uf|cep)$/i.test(lines[j])) return normalizeLine(lines[j]);
     }
   }
 }
 return '';
}
function extractKeyValue(lines,labels){for(let lab of labels){let v=lineAfter(lines,lab);if(v)return v}return ''}
function extractNFeKey(joined){
 let nums=(joined.match(/\d[\d\s]{35,70}\d/g)||[]).map(x=>onlyDigits(x)).filter(x=>x.length>=40).sort((a,b)=>b.length-a.length);
 return nums[0]||'';
}
function isNFeOrBarcode(v,data){
 let d=onlyDigits(v);
 if(d.length>=30)return true;
 if(data && data.nfeKey && data.nfeKey.includes(d) && d.length>12)return true;
 return false;
}
function extractCepBR(lines,joined){
 let explicit=extractKeyValue(lines,['CEP']);
 let m=(explicit+' '+joined).match(/\b\d{5}[- ]?\d{3}\b|\b\d{8}\b/);
 if(!m)return '';
 let v=onlyDigits(m[0]);
 return v.length===8?v.slice(0,5)+'-'+v.slice(5):m[0];
}
function extractRecipient(lines){
 let v=extractKeyValue(lines,['DESTINATARIO','DESTINATÁRIO','RECEBEDOR','CLIENTE','NOME']);
 return v.replace(/cpf.*$/i,'').trim();
}
function extractCodeBR(lines,joined,nfeKey){
 let labels=extractKeyValue(lines,['CODIGO','CÓDIGO','RASTREIO','TRACKING','PEDIDO','REMESSA','OBJETO','PROTOCOLO','VOLUME','NUMERO']);
 let pool=(labels+' '+joined);
 let candidates=pool.match(/\b[A-Z]{1,5}[- ]?\d{2,}[A-Z0-9-]{0,16}\b|\b[A-Z0-9]{6,22}\b/gi)||[];
 candidates=candidates.map(x=>x.replace(/\s/g,'').toUpperCase())
  .filter(x=>!/\d{5}-?\d{3}/.test(x))
  .filter(x=>!(nfeKey||'').includes(onlyDigits(x)) || onlyDigits(x).length<12)
  .filter(x=>!/(BRASIL|ENTREGA|ENDERECO|DESTINATARIO|REMETENTE|TELEFONE|WHATSAPP|PRODUTO|QUANTIDADE|PROTOCOLO|AUTORIZACAO|CHAVE|ACESSO|DANFE|SIMPLIFICADO)/i.test(x));
 return candidates[0] || '';
}
function extractAddressBR(lines){
 let explicit=extractKeyValue(lines,['END\\.?','ENDERECO','ENDEREÇO','LOGRADOURO','RUA','AVENIDA']);
 if(explicit && !isNFeOrBarcode(explicit)) return normalizeLine(explicit);
 const street=/(rua|r\.|av\.|avenida|travessa|trav\.|estrada|rodovia|rod\.|praca|praça|alameda|loteamento|lote|quadra|cond\.|condominio|sitio|sítio|residencial|conjunto)/i;
 let idx=lines.findIndex(l=>street.test(l) && !isNFeOrBarcode(l));
 let l=idx>=0?lines[idx]:'';
 if(idx>=0 && lines[idx+1] && !/(cpf|cnpj|pedido|nota|telefone|whats|produto|transportadora|dados adicionais|chave|protocolo)/i.test(lines[idx+1]) && !isNFeOrBarcode(lines[idx+1]) && lines[idx+1].length<90){
   l=normalizeLine(l+' '+lines[idx+1]);
 }
 return normalizeLine(l.replace(/endere[cç]o[:\- ]*/i,''));
}
function extractNumberBR(lines,address){
 let explicit=extractKeyValue(lines,['NUM\\.?','N\\.?','NUMERO','NÚMERO']);
 if(explicit && onlyDigits(explicit).length<=6)return explicit;
 let m=String(address||'').match(/\b(?:n[ºo]?|numero|num)?\s*(\d{1,6}[A-Z]?)\b/i);
 return m?m[1]:'';
}
function extractComplementBR(lines){
 let v=extractKeyValue(lines,['COMP\\.?','COMPLEMENTO','REFERENCIA','REFERÊNCIA','APTO','APARTAMENTO','BLOCO','TORRE']);
 return isNFeOrBarcode(v)?'':v;
}
function extractNeighborhoodBR(lines,address){
 let explicit=extractKeyValue(lines,['BAIRRO']);
 if(explicit && !isNFeOrBarcode(explicit))return explicit;
 let b=lines.find(x=>/(bairro|jd\.|jardim|centro|gaibu|cohab|prazeres|ponte dos carvalhos|cabo|recife|jaboatao|jaboatão|olinda|boa viagem|piedade|candeias|curado|muribeca|santo aleixo|paiva)/i.test(x))||'';
 b=normalizeLine(b.replace(/bairro[:\- ]*/i,''));
 if(!b && address && address.includes('-')) b=normalizeLine(address.split('-').slice(-1)[0]);
 return b;
}
function extractCityBR(lines){
 let explicit=extractKeyValue(lines,['CIDADE','MUNICIPIO','MUNICÍPIO']);
 if(explicit && !isNFeOrBarcode(explicit))return explicit;
 return normalizeLine(lines.find(x=>/(cabo de santo agostinho|recife|jaboatao|jaboatão|olinda|paulista|ipojuca|PE\b|SP\b|RJ\b|MG\b|BA\b|CE\b|PB\b|AL\b|RN\b|PR\b|SC\b|RS\b)/i.test(x))||'');
}
function extractUF(lines,joined){
 let explicit=extractKeyValue(lines,['UF']);
 let m=(explicit+' '+joined).match(/\b(AC|AL|AP|AM|BA|CE|DF|ES|GO|MA|MT|MS|MG|PA|PB|PR|PE|PI|RJ|RN|RS|RO|RR|SC|SP|SE|TO)\b/i);
 return m?m[1].toUpperCase():'';
}
function extractCompany(lines){
 let v=extractKeyValue(lines,['EMITENTE','REMETENTE','TRANSPORTADORA','EMPRESA']);
 return v.replace(/cnpj.*$/i,'').trim();
}
function confidenceScore(data){
 let s=0;
 if(data.code)s+=12;
 if(data.address)s+=28;
 if(data.number)s+=10;
 if(data.neighborhood)s+=15;
 if(data.cep)s+=15;
 if(data.city)s+=10;
 if(data.uf)s+=5;
 if(data.recipient)s+=5;
 if(isNFeOrBarcode(data.address,data))s-=35;
 return Math.max(0,Math.min(100,s));
}
function guessFromOCR(text){
 text=cleanOCRText(text);
 let lines=text.split('\n').map(normalizeLine).filter(Boolean);
 let joined=lines.join(' ');
 let nfeKey=extractNFeKey(joined);
 let address=extractAddressBR(lines);
 let number=extractNumberBR(lines,address);
 let complement=extractComplementBR(lines);
 let data={
   nfeKey,
   code:extractCodeBR(lines,joined,nfeKey),
   recipient:extractRecipient(lines),
   address,
   number:(number+(complement?' - '+complement:'')),
   neighborhood:extractNeighborhoodBR(lines,address),
   city:extractCityBR(lines),
   uf:extractUF(lines,joined),
   cep:extractCepBR(lines,joined),
   company:extractCompany(lines),
   raw:text
 };
 data.score=confidenceScore(data);
 if(isNFeOrBarcode(data.address,data))data.address='';
 return data;
}

   const data=guessFromOCR(result.data.text||'');

   logSync('OCR concluído'); save(); render();
 }catch(e){ alert('Não consegui ler a etiqueta. Tente uma foto mais clara.'); }
}

   if(ba!==0)return ba;
   return (a.address||'').localeCompare(b.address||'');
 });
}

function ensureQueue(){
 if(!state.loadQueue)state.loadQueue=[];
 if(!state.batch)state.batch={running:false,paused:false,total:0,done:0};
}
function compressImage(dataUrl,maxW=1100,quality=.72){
 return new Promise(resolve=>{
   let img=new Image();
   img.onload=()=>{
     let scale=Math.min(1,maxW/img.width);
     let c=document.createElement('canvas');
     c.width=Math.round(img.width*scale); c.height=Math.round(img.height*scale);
     let ctx=c.getContext('2d');
     ctx.drawImage(img,0,0,c.width,c.height);
     resolve(c.toDataURL('image/jpeg',quality));
   };
   img.onerror=()=>resolve(dataUrl);
   img.src=dataUrl;
 });
}
function addLoadPhotos(inp){
 ensureQueue();
 let files=[...(inp.files||[])].slice(0,100);
 if(!files.length)return;
 let left=files.length;
 files.forEach((f,i)=>{
   let r=new FileReader();
   r.onload=async()=>{
     let photo=await compressImage(r.result);
     state.loadQueue.push({
       id:crypto.randomUUID(),
       photo,
       status:'aguardando',
       raw:'',
       code:'',
       address:'',
       number:'',
       neighborhood:'',
       position:'',
       score:0,
       created:new Date().toISOString()
     });
     left--;
     if(left===0){
       state.batch.total=state.loadQueue.length;
       save(); render();
       speak(files.length+' fotos adicionadas. Fila pronta para processar.');
     }
   };
   r.readAsDataURL(f);
 });
 inp.value='';
}

 let pct=total?Math.round((done/total)*100):0;
 return {total,done,waiting,reading,pct};
}


function imageForOCR(dataUrl, mode='normal'){
 return new Promise(resolve=>{
   const img=new Image();
   img.onload=()=>{
     const maxW = mode==='zoom' ? 2200 : 1800;
     const scale=Math.min(1,maxW/img.width);
     const c=document.createElement('canvas');
     c.width=Math.max(1,Math.round(img.width*scale));
     c.height=Math.max(1,Math.round(img.height*scale));
     const ctx=c.getContext('2d',{willReadFrequently:true});
     ctx.drawImage(img,0,0,c.width,c.height);
     try{
       let im=ctx.getImageData(0,0,c.width,c.height);
       let d=im.data;
       for(let i=0;i<d.length;i+=4){
         let r=d[i],g=d[i+1],b=d[i+2];
         let gray=0.299*r+0.587*g+0.114*b;
         if(mode==='bw'){
           gray = gray>145 ? 255 : 0;
         }else{
           gray = Math.max(0,Math.min(255,(gray-112)*1.75+128));
         }
         d[i]=d[i+1]=d[i+2]=gray;
       }
       ctx.putImageData(im,0,0);
     }catch(e){}
     resolve(c.toDataURL('image/jpeg',0.94));
   };
   img.onerror=()=>resolve(dataUrl);
   img.src=dataUrl;
 });
}
function cropCenterLabel(dataUrl){
 return new Promise(resolve=>{
   const img=new Image();
   img.onload=()=>{
     const w=img.width,h=img.height;
     const cropW=Math.round(w*0.82);
     const cropH=Math.round(h*0.62);
     const sx=Math.round((w-cropW)/2);
     const sy=Math.round(h*0.12);
     const c=document.createElement('canvas');
     c.width=cropW*2;
     c.height=cropH*2;
     const ctx=c.getContext('2d',{willReadFrequently:true});
     ctx.drawImage(img,sx,sy,cropW,cropH,0,0,c.width,c.height);
     resolve(c.toDataURL('image/jpeg',0.96));
   };
   img.onerror=()=>resolve(dataUrl);
   img.src=dataUrl;
 });
}
function cropUpperLabel(dataUrl){
 return new Promise(resolve=>{
   const img=new Image();
   img.onload=()=>{
     const w=img.width,h=img.height;
     const cropW=Math.round(w*0.90);
     const cropH=Math.round(h*0.75);
     const sx=Math.round((w-cropW)/2);
     const sy=Math.round(h*0.03);
     const c=document.createElement('canvas');
     c.width=cropW*2;
     c.height=cropH*2;
     const ctx=c.getContext('2d',{willReadFrequently:true});
     ctx.drawImage(img,sx,sy,cropW,cropH,0,0,c.width,c.height);
     resolve(c.toDataURL('image/jpeg',0.96));
   };
   img.onerror=()=>resolve(dataUrl);
   img.src=dataUrl;
 });
}
function ocrQualityReason(item){
 let s=Number(item.score||0);
 if(s>=70)return 'Leitura boa.';
 if(!item.address && !item.cep)return 'Foto pode estar distante, desfocada ou com reflexo. Use a opção de foto com a etiqueta ocupando quase toda a tela.';
 if(!item.address)return 'Endereço não identificado. Aproxime a câmera da parte onde aparece ENDEREÇO/END.';
 if(!item.cep)return 'CEP não identificado. Confira se a parte do CEP aparece nítida.';
 return 'Revise os campos antes de salvar.';
}

async function smartOCR(photo){
 const attempts=[];
 const full=await imageForOCR(photo,'hd');
 const r1=await Tesseract.recognize(full,'por+eng');
 let d1=guessFromOCR(r1.data.text||'');
 d1.rawConfidence=Math.round(r1.data.confidence||0);
 d1.ocrMode='foto inteira';
 attempts.push(d1);

 const crop=await cropCenterLabel(photo);
 const cropProcessed=await imageForOCR(crop,'zoom');
 const r2=await Tesseract.recognize(cropProcessed,'por+eng');
 let d2=guessFromOCR(r2.data.text||'');
 d2.rawConfidence=Math.round(r2.data.confidence||0);
 d2.ocrMode='recorte central';
 d2.cropPreview=crop;
 attempts.push(d2);

 let best=attempts.sort((a,b)=>Number(b.score||0)-Number(a.score||0))[0];

 if(Number(best.score||0)<70){
   const upper=await cropUpperLabel(photo);
   const bw=await imageForOCR(upper,'bw');
   const r3=await Tesseract.recognize(bw,'por+eng');
   let d3=guessFromOCR(r3.data.text||'');
   d3.rawConfidence=Math.round(r3.data.confidence||0);
   d3.ocrMode='recorte ampliado preto e branco';
   d3.cropPreview=upper;
   attempts.push(d3);
   best=attempts.sort((a,b)=>Number(b.score||0)-Number(a.score||0))[0];
 }
 return best;
}
async function processQueueItem(id,silent=false){
 ensureQueue();
 let item=state.loadQueue.find(x=>x.id===id);
 if(!item)return;
 item.status='lendo etiqueta'; save(); render();
 try{
   const data=await smartOCR(item.photo);
   Object.assign(item,{status:'revisar',raw:data.raw,code:data.code,address:data.address,neighborhood:data.neighborhood,cep:data.cep,city:data.city,uf:data.uf,recipient:data.recipient,company:data.company,number:data.number,score:data.score,rawConfidence:data.rawConfidence||0,ocrMode:data.ocrMode||'',cropPreview:data.cropPreview||'',qualityReason:''});
   item.qualityReason=ocrQualityReason(item);
   state.batch.done=(state.batch.done||0)+1;
   save(); render();
 }catch(e){
   item.status='erro';
   save(); render();
   if(!silent)alert('Erro ao ler esta foto.');
 }
}
async function processAllQueue(){
 ensureQueue();
 let pending=state.loadQueue.filter(x=>x.status==='aguardando'||x.status==='erro');
 if(!pending.length)return alert('Nenhuma foto aguardando processamento.');
 state.batch={running:true,paused:false,total:state.loadQueue.length,done:state.loadQueue.filter(x=>x.status==='revisar').length};
 save(); render();
 speak('Processando '+pending.length+' fotos.');
 for(let item of pending){
   ensureQueue();
   if(!state.batch.running)break;
   while(state.batch.paused){await new Promise(r=>setTimeout(r,600))}
   await processQueueItem(item.id,true);
 }
 state.batch.running=false;
 state.batch.paused=false;
 save(); render();
 speak('Processamento concluído. Revise e salve os pacotes.');
}
function pauseBatch(){ensureQueue();state.batch.paused=true;save();render();speak('Fila pausada.')}
function resumeBatch(){ensureQueue();state.batch.paused=false;if(!state.batch.running)processAllQueue();else{save();render();speak('Continuando fila.')}} 
function cancelBatch(){ensureQueue();state.batch.running=false;state.batch.paused=false;state.loadQueue.forEach(x=>{if(x.status==='lendo etiqueta')x.status='aguardando'});save();render();speak('Processamento cancelado.')}

function autoPositionByIndex(i,total){
 if(total<=0)return 'Meio';
 const p=(i+1)/total;
 if(p<=0.25)return 'Frente';
 if(p<=0.50)return 'Lado direito';
 if(p<=0.75)return 'Lado esquerdo';
 return 'Fundo';
}
function normalizeBairro(b){
 b=String(b||'').trim();
 return b || 'Sem bairro';
}
function cargoGroups(){
 const list=[...(state.packs||[])].filter(p=>p.status!=='delivered');
 list.sort((a,b)=>(normalizeBairro(a.neighborhood||a.bairro||'')).localeCompare(normalizeBairro(b.neighborhood||b.bairro||''),'pt-BR'));
 return list.reduce((acc,p,i)=>{
   const bairro=normalizeBairro(p.neighborhood||p.bairro||'');
   if(!acc[bairro])acc[bairro]=[];
   acc[bairro].push({...p,_suggest:autoPositionByIndex(i,list.length)});
   return acc;
 },{});
}

function packList(){
 return [...(state.packs||[])].sort((a,b)=>{
   let ba=(a.neighborhood||'').localeCompare(b.neighborhood||'','pt-BR');
   if(ba!==0)return ba;
   return (a.createdMs||0)-(b.createdMs||0);
 });
}
function priorityOfPack(index,total){
 if(total<=1)return ['pHigh','Próxima'];
 const p=(index+1)/total;
 if(p<=0.33)return ['pHigh','Próxima'];
 if(p<=0.66)return ['pMid','Intermediária'];
 return ['pLow','Última'];
}

 return list.filter(p=>[
   p.code,p.recipient,p.address,p.neighborhood,p.cep,p.city,p.position
 ].join(' ').toLowerCase().includes(q)).slice(0,12);
}

function positionCode(pos,i){
 const map={'Frente':'F','Lado direito':'D','Lado esquerdo':'E','Fundo':'T','Meio':'M'};
 return (map[pos]||'M')+(i+1);
}
function mapaCargaData(){
 const list=packList().filter(p=>p.status!=='delivered');
 const positions=['Frente','Lado direito','Lado esquerdo','Fundo'];
 const buckets={Frente:[], 'Lado direito':[], 'Lado esquerdo':[], Fundo:[]};
 list.forEach((p,i)=>{
   const pos=p.position||autoPositionByIndex(i,list.length);
   const key=buckets[pos]?pos:'Fundo';
   buckets[key].push(p);
 });
 return {positions,buckets,list};
}



function regiaoPacote(p){
 const bairro = String((p && (p.neighborhood || p.bairro)) || '').trim();
 const cep = String((p && p.cep) || '').trim();
 if(bairro) return bairro;
 if(cep) return 'CEP ' + cep.slice(0,5);
 return 'Sem região';
}
function prioridadePacote(index,total){
 if(total<=1)return 'Próxima';
 const p=(index+1)/total;
 if(p<=0.33)return 'Alta';
 if(p<=0.66)return 'Média';
 return 'Baixa';
}
function posicaoInteligente(index,total){
 if(total<=0)return 'Meio';
 const p=(index+1)/total;
 if(p<=0.20)return 'Banco passageiro';
 if(p<=0.40)return 'Frente';
 if(p<=0.65)return 'Lado direito';
 if(p<=0.85)return 'Lado esquerdo';
 return 'Porta-malas / fundo';
}
function organizarCargaIA(){
 const list=[...(state.packs||[])].filter(p=>p && p.status!=='delivered');
 list.sort((a,b)=>{
   const ra=regiaoPacote(a), rb=regiaoPacote(b);
   const c=ra.localeCompare(rb,'pt-BR');
   if(c!==0)return c;
   return String(a.address||'').localeCompare(String(b.address||''),'pt-BR');
 });
 const total=list.length;
 state.packs=(state.packs||[]).map(p=>{
   const i=list.findIndex(x=>x.id===p.id);
   if(i<0)return p;
   return {...p, position: posicaoInteligente(i,total), prioridade: prioridadePacote(i,total), ordemCarga: i+1};
 });
 save();
 render();
}

 return list.reduce((acc,p)=>{
   const r=regiaoPacote(p);
   if(!acc[r])acc[r]=[];
   acc[r].push(p);
   return acc;
 },{});
}

function rotaList(){
 const list=[...(state.packs||[])].filter(p=>p && p.status!=='delivered');
 list.sort((a,b)=>{
   const ra=regiaoPacote(a), rb=regiaoPacote(b);
   const c=ra.localeCompare(rb,'pt-BR');
   if(c!==0)return c;
   const ca=String(a.cep||''), cb=String(b.cep||'');
   if(ca!==cb)return ca.localeCompare(cb);
   return String(a.address||'').localeCompare(String(b.address||''),'pt-BR');
 });
 return list.map((p,i)=>({...p, rotaOrdem:i+1}));
}
function rotaEndereco(p){
 return [p.address,p.number,p.neighborhood,p.city,p.uf,p.cep].filter(Boolean).join(', ');
}
function rotaStats(){
 const list=rotaList();
 const bairros=[...new Set(list.map(p=>regiaoPacote(p)))];
 const km=Math.max(0, Math.round((list.length*2.1 + bairros.length*1.7)*10)/10);
 const min=Math.max(0, Math.round(list.length*7 + bairros.length*5));
 const economia=Math.max(0, Math.round(list.length*2.5));
 return {total:list.length,bairros:bairros.length,km,min,economia};
}

function smartLoadList(){
 const list=[...(state.packs||[])].filter(p=>p && p.status!=='delivered');
 list.sort((a,b)=>{
   const pa=Number(a.ordemCarga||9999), pb=Number(b.ordemCarga||9999);
   if(pa!==pb)return pa-pb;
   const ra=(typeof regiaoPacote==='function')?regiaoPacote(a):String(a.neighborhood||'');
   const rb=(typeof regiaoPacote==='function')?regiaoPacote(b):String(b.neighborhood||'');
   const c=ra.localeCompare(rb,'pt-BR');
   if(c!==0)return c;
   return String(a.address||'').localeCompare(String(b.address||''),'pt-BR');
 });
 return list.map((p,i)=>({...p,_route:i+1,_smartPos:p.position||((typeof posicaoInteligente==='function')?posicaoInteligente(i,list.length):'Meio')}));
}
function laneFromPosition(pos){
 pos=String(pos||'').toLowerCase();
 if(pos.includes('esquer'))return 'esq';
 if(pos.includes('direit'))return 'dir';
 return 'meio';
}
function smartEndereco(p){
 return [p.address,p.number,p.neighborhood,p.city,p.uf,p.cep].filter(Boolean).join(', ');
}

 const trialMs=3*24*60*60*1000;
 const end=Number(state.trialStartedAt||now)+trialMs;
